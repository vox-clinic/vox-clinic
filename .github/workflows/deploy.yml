name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npx tsc --noEmit
      - run: npm run lint || echo "::warning::Lint has pre-existing warnings — will be fixed incrementally"
      - run: npm audit --audit-level=high || true

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # E2E tests require real env vars (Clerk, Supabase) to start the dev server.
  # Run manually: npm run test:e2e
  # TODO: Re-enable when CI has staging env configured.
  # e2e-tests:
  #   name: E2E Tests
  #   needs: unit-tests
  #   ...
